# =============================================================================
# nginx.conf
# RUTA: tienda-front/nginx.conf
#
# Funciona en DOS contextos:
#
# 1. LOCAL (docker compose):
#    El frontend se llama desde http://localhost:4200
#    El proxy /api/ apunta a http://backend:8080
#    (docker-compose resuelve "backend" por el nombre del servicio)
#
# 2. PRODUCCIÓN (GKE):
#    El proxy /api/ apunta a http://backend-service:8080
#    (Kubernetes DNS resuelve "backend-service" por el Service de K8s)
#
# La variable BACKEND_HOST se inyecta al iniciar el contenedor.
# Si no se define, usa "backend-service" por defecto (funciona en GKE).
# Para local, docker-compose pasa BACKEND_HOST=backend.
# =============================================================================

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # =========================================================================
    # PROXY REVERSO PARA LA API
    # En GKE:  proxy_pass http://backend-service:8080
    # En local: proxy_pass http://backend:8080
    # =========================================================================
    location /api/ {
        proxy_pass http://backend-service:8080;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;

        proxy_intercept_errors off;
    }

    # =========================================================================
    # ROUTING DE ANGULAR SPA (app.routes.ts)
    # Sin esto, recargar cualquier ruta da 404
    # =========================================================================
    location / {
        try_files $uri $uri/ /index.html;
    }

    # =========================================================================
    # CACHE DE ASSETS ESTÁTICOS
    # =========================================================================
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # =========================================================================
    # COMPRESIÓN GZIP
    # =========================================================================
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    server_tokens off;
}