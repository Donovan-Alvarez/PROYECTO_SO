apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-deployment
  namespace: default
  labels:
    app: backend
    project: proyecto-so
spec:
  replicas: 2

  # ===========================================================================
  # ESTRATEGIA DE ACTUALIZACIÓN
  # maxSurge: 0      → NO crear Pods extra antes de eliminar los viejos
  # maxUnavailable: 1 → Eliminar 1 Pod viejo antes de crear el nuevo
  # Esto evita el problema de "Pending" por falta de CPU durante el rollout
  # ===========================================================================
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1

  selector:
    matchLabels:
      app: backend

  template:
    metadata:
      labels:
        app: backend
        project: proyecto-so
    spec:
      serviceAccountName: backend-ksa
      containers:
        - name: backend
          image: us-central1-docker.pkg.dev/proyecto-so-grupo-2/proyecto-so/backend:latest
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: SPRING_PROFILES_ACTIVE
              valueFrom:
                configMapKeyRef:
                  name: proyecto-so-config
                  key: SPRING_PROFILES_ACTIVE
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: DB_NAME
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: DB_PASSWORD
            - name: TZ
              valueFrom:
                configMapKeyRef:
                  name: proyecto-so-config
                  key: TZ
            - name: SPRING_JPA_HIBERNATE_DDL_AUTO
              value: "update"
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 90
            periodSeconds: 30
            failureThreshold: 5
            timeoutSeconds: 15
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 15
            failureThreshold: 5
            timeoutSeconds: 10

        - name: cloud-sql-proxy
          image: gcr.io/cloud-sql-connectors/cloud-sql-proxy:2.11.0
          args:
            - "--structured-logs"
            - "--port=3306"
            - "proyecto-so-grupo-2:us-central1:proyecto-so-db"
          securityContext:
            runAsNonRoot: true
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
