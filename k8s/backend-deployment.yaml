# =============================================================================
# k8s/backend-deployment.yaml
# RUTA: k8s/backend-deployment.yaml
#
# Deployment del backend Spring Boot con Cloud SQL Auth Proxy como sidecar.
# connectionName real: proyecto-so-grupo-2:us-central1:proyecto-so-db
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-deployment
  namespace: default
  labels:
    app: backend
    project: proyecto-so
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
        project: proyecto-so
    spec:
      serviceAccountName: backend-ksa
      containers:
        # -------------------------------------------------------------------
        # CONTENEDOR PRINCIPAL: Spring Boot
        # -------------------------------------------------------------------
        - name: backend
          image: us-central1-docker.pkg.dev/proyecto-so-grupo-2/proyecto-so/backend:latest
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: SPRING_PROFILES_ACTIVE
              valueFrom:
                configMapKeyRef:
                  name: proyecto-so-config
                  key: SPRING_PROFILES_ACTIVE
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: DB_NAME
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: DB_PASSWORD
            - name: TZ
              valueFrom:
                configMapKeyRef:
                  name: proyecto-so-config
                  key: TZ
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 30
            failureThreshold: 3
            timeoutSeconds: 10
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 5

        # -------------------------------------------------------------------
        # SIDECAR: Cloud SQL Auth Proxy
        # Abre 127.0.0.1:3306 → proyecto-so-grupo-2:us-central1:proyecto-so-db
        # -------------------------------------------------------------------
        - name: cloud-sql-proxy
          image: gcr.io/cloud-sql-connectors/cloud-sql-proxy:2.11.0
          args:
            - "--structured-logs"
            - "--port=3306"
            - "proyecto-so-grupo-2:us-central1:proyecto-so-db"
          securityContext:
            runAsNonRoot: true
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
