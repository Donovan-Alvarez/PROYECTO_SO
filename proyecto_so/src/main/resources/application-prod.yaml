# =============================================================================
# application-prod.yaml
# RUTA: backend/src/main/resources/application-prod.yaml
#
# Se activa cuando Spring corre con: -Dspring.profiles.active=prod
# (el Dockerfile lo pasa automáticamente en el ENTRYPOINT)
#
# Todos los valores sensibles vienen de variables de entorno que,
# en GKE, se inyectan desde Kubernetes Secrets y ConfigMaps.
# =============================================================================

spring:
  datasource:
    # Cloud SQL Auth Proxy escucha en 127.0.0.1:3306 dentro del mismo Pod
    url: jdbc:mysql://127.0.0.1:3306/${DB_NAME}?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    hikari:
      # Configuración del pool de conexiones para producción
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000

  jpa:
    hibernate:
      # NUNCA "update" en producción — puede modificar o borrar columnas
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: false

  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:25}
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false

server:
  # Puerto HTTP dentro del cluster (SSL lo termina el Load Balancer de GCP)
  port: 8080
  ssl:
    enabled: false

# ============================================================================
# ACTUATOR — Health probes para Kubernetes
# Expone /actuator/health/liveness y /actuator/health/readiness
# Kubernetes usa estos endpoints para saber si el Pod está vivo y listo
# ============================================================================
management:
  endpoints:
    web:
      exposure:
        include: health
      base-path: /actuator
  endpoint:
    health:
      probes:
        enabled: true       # Habilita /liveness y /readiness
      show-details: never   # No exponer detalles internos en producción
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true

logging:
  level:
    root: INFO
    com.proyectoSo: INFO
    org.springframework.security: WARN