spring:
  mail:
    host: localhost
    port: 25
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false
  application:
    name: proyecto_so
  datasource:
    url: jdbc:mysql://localhost:3306/proyecto_so?allowPublicKeyRetrieval=true&useSSL=false
    username: donovan_user
    password: 1234
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
