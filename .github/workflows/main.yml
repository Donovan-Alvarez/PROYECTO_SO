# =============================================================================
# .github/workflows/main.yml
# RUTA: .github/workflows/main.yml  (en la raíz de CADA repositorio)
#
# Este workflow se activa al hacer push a la rama main.
# Pasos:
#   1. Ejecuta las pruebas unitarias (Maven/npm)
#   2. Construye las imágenes Docker
#   3. Las sube a Google Artifact Registry
#   4. Actualiza el despliegue en GKE
#
# SECRETS que debes configurar en GitHub (Settings → Secrets → Actions):
#   GCP_PROJECT_ID        → proyecto-so-grupo-2
#   GCP_SA_KEY            → JSON de la Service Account (ver instrucciones abajo)
#   GKE_CLUSTER_NAME      → nombre de tu cluster GKE
#   GKE_CLUSTER_ZONE      → us-central1  (o tu zona/región)
# =============================================================================
name: CI/CD — Build, Test & Deploy to GKE

on:
  push:
    branches:
      - main          # Solo se activa en push a main
  pull_request:
    branches:
      - main          # Corre tests en PRs (pero no despliega)

# Variables de entorno globales del workflow
env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GAR_LOCATION: us-central1                              # Región de Artifact Registry
  REPOSITORY: proyecto-so                                # Nombre del repositorio en AR
  GKE_CLUSTER: ${{ secrets.GKE_CLUSTER_NAME }}
  GKE_ZONE: ${{ secrets.GKE_CLUSTER_ZONE }}

jobs:
  # ===========================================================================
  # JOB 1: Tests del Backend (Java/Maven)
  # ===========================================================================
  test-backend:
    name: 🧪 Test Backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven           # Cachea dependencias Maven entre runs

      - name: Ejecutar tests con Maven
        working-directory: ./backend   # AJUSTA según la estructura de tu repo
        run: mvn test -B

      - name: Publicar reporte de tests
        uses: actions/upload-artifact@v4
        if: always()              # Sube el reporte incluso si los tests fallan
        with:
          name: test-results-backend
          path: backend/target/surefire-reports/

  # ===========================================================================
  # JOB 2: Tests del Frontend (Angular)
  # ===========================================================================
  test-frontend:
    name: 🧪 Test Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar dependencias
        working-directory: ./frontend   # AJUSTA según la estructura de tu repo
        run: npm ci

      - name: Ejecutar tests Angular
        working-directory: ./frontend
        run: npm test -- --watch=false --browsers=ChromeHeadless

  # ===========================================================================
  # JOB 3: Build y Deploy (solo en push a main, no en PRs)
  # ===========================================================================
  build-and-deploy:
    name: 🚀 Build & Deploy to GKE
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]   # Solo corre si los tests pasan
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      # -----------------------------------------------------------------------
      # AUTENTICACIÓN CON GCP
      # -----------------------------------------------------------------------
      - name: Autenticar con Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Configurar gcloud CLI
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      # Configura Docker para usar Artifact Registry
      - name: Configurar Docker para Artifact Registry
        run: |
          gcloud auth configure-docker ${{ env.GAR_LOCATION }}-docker.pkg.dev --quiet

      # -----------------------------------------------------------------------
      # BUILD Y PUSH — BACKEND
      # -----------------------------------------------------------------------
      - name: Construir imagen Backend
        working-directory: ./backend
        run: |
          docker build \
            -t ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/backend:${{ github.sha }} \
            -t ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/backend:latest \
            .

      - name: Push imagen Backend a Artifact Registry
        run: |
          docker push ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/backend:${{ github.sha }}
          docker push ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/backend:latest

      # -----------------------------------------------------------------------
      # BUILD Y PUSH — FRONTEND
      # -----------------------------------------------------------------------
      - name: Construir imagen Frontend
        working-directory: ./frontend
        run: |
          docker build \
            -t ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/frontend:${{ github.sha }} \
            -t ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/frontend:latest \
            .

      - name: Push imagen Frontend a Artifact Registry
        run: |
          docker push ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/frontend:${{ github.sha }}
          docker push ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/frontend:latest

      # -----------------------------------------------------------------------
      # DEPLOY A GKE
      # -----------------------------------------------------------------------
      - name: Obtener credenciales del cluster GKE
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ env.GKE_CLUSTER }}
          location: ${{ env.GKE_ZONE }}

      - name: Actualizar imagen del Backend en GKE
        run: |
          kubectl set image deployment/backend-deployment \
            backend=${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/backend:${{ github.sha }}

      - name: Actualizar imagen del Frontend en GKE
        run: |
          kubectl set image deployment/frontend-deployment \
            frontend=${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/frontend:${{ github.sha }}

      # Espera que el rollout termine antes de declarar éxito
      - name: Verificar rollout del Backend
        run: kubectl rollout status deployment/backend-deployment --timeout=5m

      - name: Verificar rollout del Frontend
        run: kubectl rollout status deployment/frontend-deployment --timeout=5m

      - name: ✅ Deploy completado
        run: |
          echo "Deploy exitoso!"
          echo "Backend: ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/backend:${{ github.sha }}"
          echo "Frontend: ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/frontend:${{ github.sha }}"
